# Полный отдельный server{} блок для поддомена llm.jorchik.com.
# Вставляется как отдельный файл в /etc/nginx/sites-available/llm.jorchik.com
# (и симлинк в sites-enabled), а НЕ мёржится в существующий server-блок
# jorchik.com — это отдельный виртуальный хост со своим фронтом и backend'ом.
#
# Требуется DNS A-запись llm.jorchik.com -> IP этого VPS ДО выпуска TLS.
#
# Frontend static build выложен в /var/www/webchat-local (см. deploy/README.md).
# Backend — webchat-local.service на 127.0.0.1:8010 (same-origin /chat, /health).

server {
    listen 80;
    listen [::]:80;
    server_name llm.jorchik.com;

    root /var/www/webchat-local;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gate token (Bearer header ИЛИ ?token=). Фронт зашивает токен в публичный
    # JS-бандл — это не настоящий секрет, а защита от drive-by/прямого злоупотребления
    # прокси к Ollama. Реальная защита от нагрузки — limit_req ниже.
    location = /chat {
        set $auth_ok "";
        if ($http_authorization = "Bearer __CHAT_TOKEN__") { set $auth_ok "yes"; }
        if ($arg_token = "__CHAT_TOKEN__") { set $auth_ok "yes"; }
        if ($auth_ok != "yes") { return 401 '{"error":"Unauthorized"}'; }
        limit_req zone=chat_local burst=10 nodelay;  # зона задана в nginx-ratelimit.conf
        proxy_pass http://127.0.0.1:8010/chat;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 180s;  # 3B на CPU генерирует медленно
    }

    location = /health {
        proxy_pass http://127.0.0.1:8010/health;
        proxy_set_header Host $host;
    }

    # --- TLS (managed by Certbot: sudo certbot --nginx -d llm.jorchik.com) ---
    # После выпуска сертификата certbot сам допишет сюда/перепишет блок примерно так:
    #
    # listen 443 ssl;
    # listen [::]:443 ssl;
    # ssl_certificate /etc/letsencrypt/live/llm.jorchik.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/llm.jorchik.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    #
    # и добавит отдельный server{} на listen 80, редиректящий на https.
}
