# Деплой в /etc/nginx/conf.d/webchat-local-ratelimit.conf
# Должен жить в http{} контексте (conf.d/* туда инклудится), НЕ внутри server
# или location. Используется как `limit_req zone=chat_local ...` в location /chat
# из nginx-llm.conf.
#
# Отдельная зона chat_local — НЕ пересекается с зоной chat основного webchat
# (см. ../../webchat/deploy/nginx-ratelimit.conf), у поддомена свой лимит.
#
# rate=30r/m (~0.5 req/s sustained) на клиентский IP; burst=10 nodelay гасит
# короткие всплески. Локальная 3B-модель на CPU и так медленная — лимит скорее
# защита от случайного зацикливания фронта, чем от затрат (модель бесплатная).
limit_req_zone $binary_remote_addr zone=chat_local:10m rate=30r/m;
# ВНИМАНИЕ: limit_req_status здесь НЕ задаём — это одиночная http-директива, и её
# уже выставляет webchat-ratelimit.conf (429) на весь http-контекст. Дубликат
# ломает `nginx -t` ("limit_req_status directive is duplicate"). Наш /chat и так
# отдаёт 429 из общей настройки.
